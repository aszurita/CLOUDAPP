name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci-cd.yml"
  pull_request:
    paths:
      - "backend/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest

  deploy:
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Validate deployment secrets
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          AZURE_CONTAINER_APP_NAME: ${{ secrets.AZURE_CONTAINER_APP_NAME }}
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_JOB_ID: ${{ secrets.DATABRICKS_JOB_ID }}
          DATAOPS_PIPELINES_JSON: ${{ secrets.DATAOPS_PIPELINES_JSON }}
        run: |
          test -n "$AZURE_CREDENTIALS" || (echo "Missing GitHub secret: AZURE_CREDENTIALS" && exit 1)
          test -n "$AZURE_RESOURCE_GROUP" || (echo "Missing GitHub secret: AZURE_RESOURCE_GROUP" && exit 1)
          test -n "$AZURE_CONTAINER_APP_NAME" || (echo "Missing GitHub secret: AZURE_CONTAINER_APP_NAME" && exit 1)
          test -n "$ACR_LOGIN_SERVER" || (echo "Missing GitHub secret: ACR_LOGIN_SERVER" && exit 1)
          test -n "$ACR_USERNAME" || (echo "Missing GitHub secret: ACR_USERNAME" && exit 1)
          test -n "$ACR_PASSWORD" || (echo "Missing GitHub secret: ACR_PASSWORD" && exit 1)
          test -n "$OPENAI_API_KEY" || (echo "Missing GitHub secret: OPENAI_API_KEY" && exit 1)
          python -m json.tool <<< "$AZURE_CREDENTIALS" > /dev/null || (echo "AZURE_CREDENTIALS is not valid JSON" && exit 1)
          if { test -n "$DATABRICKS_HOST" || test -n "$DATABRICKS_TOKEN" || test -n "$DATABRICKS_JOB_ID"; } && \
             { test -z "$DATABRICKS_HOST" || test -z "$DATABRICKS_TOKEN" || test -z "$DATABRICKS_JOB_ID"; }; then
            echo "DATABRICKS_HOST, DATABRICKS_TOKEN and DATABRICKS_JOB_ID must be configured together."
            exit 1
          fi
          if [ -n "$DATAOPS_PIPELINES_JSON" ]; then
            python -m json.tool <<< "$DATAOPS_PIPELINES_JSON" > /dev/null || (echo "DATAOPS_PIPELINES_JSON is not valid JSON" && exit 1)
          fi
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Build and push backend image
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/cloudapp-backend:${{ github.sha }} backend
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/cloudapp-backend:${{ github.sha }}
      - name: Update Container App secrets
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_JOB_ID: ${{ secrets.DATABRICKS_JOB_ID }}
        run: |
          az containerapp secret set \
            --name "${{ secrets.AZURE_CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --secrets openai-api-key="${{ secrets.OPENAI_API_KEY }}"
          if [ -n "$DATABRICKS_TOKEN" ]; then
            az containerapp secret set \
              --name "${{ secrets.AZURE_CONTAINER_APP_NAME }}" \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --secrets databricks-token="$DATABRICKS_TOKEN"
          fi
      - name: Update Container App
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_JOB_ID: ${{ secrets.DATABRICKS_JOB_ID }}
          DATAOPS_PIPELINES_JSON: ${{ secrets.DATAOPS_PIPELINES_JSON }}
        run: |
          az containerapp update \
            --name "${{ secrets.AZURE_CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --image "${{ secrets.ACR_LOGIN_SERVER }}/cloudapp-backend:${{ github.sha }}" \
            --set-env-vars OPENAI_API_KEY=secretref:openai-api-key
          if [ -n "$DATABRICKS_HOST" ]; then
            az containerapp update \
              --name "${{ secrets.AZURE_CONTAINER_APP_NAME }}" \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --set-env-vars \
                DATABRICKS_HOST="$DATABRICKS_HOST" \
                DATABRICKS_TOKEN=secretref:databricks-token \
                DATABRICKS_JOB_ID="$DATABRICKS_JOB_ID"
          fi
          if [ -n "$DATAOPS_PIPELINES_JSON" ]; then
            az containerapp update \
              --name "${{ secrets.AZURE_CONTAINER_APP_NAME }}" \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --set-env-vars DATAOPS_PIPELINES_JSON="$DATAOPS_PIPELINES_JSON"
          fi
          az containerapp ingress enable \
            --name "${{ secrets.AZURE_CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --type external \
            --target-port 8000
